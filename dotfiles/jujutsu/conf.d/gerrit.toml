--when.repositories = ["~/Repos"]
--when.hostnames = ["maxcchuang.c.googlers.com"]

[user]
name = "maxcchuang"
email = "maxcchuang@google.com"

[aliases]
# Push all commits in the chain to Gerrit.
repo-up = ["util", "exec", "--", "bash", "-c", """
set -euo pipefail
REVSET=${1:-"@-"}

HASH=$(jj log -r "${REVSET}" -T commit_id --no-graph)
DESCRIPTION=$(git log -n 1 ${HASH} --oneline --color=always)
echo "Pushing from commit ${DESCRIPTION}"

git push goog "${HASH}":refs/for/main
""", ""]


[templates]
commit_trailers = """
if(
  !trailers.contains_key("Change-Id"),
  format_gerrit_change_id_trailer(self)
)
"""
